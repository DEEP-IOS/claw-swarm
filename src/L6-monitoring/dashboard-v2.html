<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Claw-Swarm V5.4 — Hive Dashboard</title>
<style>
/* ═══════════════════════════════════════════════════════════════════════════
   CSS — Claw-Swarm V5.4 Bee Swarm Intelligence Dashboard
   Single-file, no external dependencies, production-quality dark theme
   ═══════════════════════════════════════════════════════════════════════════ */

*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg-primary:#0F0F23;
  --bg-surface:#1A1A2E;
  --bg-elevated:#16213E;
  --border:#2A2A4A;
  --text-primary:#E8E8F0;
  --text-dim:#8888AA;
  --amber:#F5A623;
  --emerald:#10B981;
  --red:#EF4444;
  --blue:#3B82F6;
  --purple:#8B5CF6;
  --font-sans:'Segoe UI',system-ui,-apple-system,sans-serif;
  --font-mono:'Cascadia Code','Fira Code','JetBrains Mono',monospace;
}

html,body{height:100%;overflow:hidden}

body{
  font-family:var(--font-sans);
  background:var(--bg-primary);
  color:var(--text-primary);
  display:grid;
  grid-template-rows:52px 1fr auto;
  grid-template-columns:240px 1fr 280px;
  grid-template-areas:
    "header header header"
    "left   main   right"
    "footer footer footer";
  height:100vh;
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg-primary)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-dim)}

/* ══════════════════════════════════════════════════════════════════
   HEADER
   ══════════════════════════════════════════════════════════════════ */
header{
  grid-area:header;
  background:var(--bg-surface);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 20px;
  gap:16px;
  z-index:100;
  user-select:none;
}

.logo{
  display:flex;align-items:center;gap:8px;
  font-size:16px;font-weight:700;color:var(--amber);
  white-space:nowrap;letter-spacing:0.5px;
}
.logo span.version{
  font-size:10px;font-weight:400;color:var(--text-dim);
  background:var(--bg-primary);padding:2px 6px;border-radius:4px;
  vertical-align:middle;margin-left:4px;
}

.view-tabs{
  display:flex;gap:2px;margin-left:32px;
  background:var(--bg-primary);border-radius:8px;padding:3px;
}
.view-tab{
  padding:6px 16px;border-radius:6px;font-size:12px;font-weight:600;
  color:var(--text-dim);cursor:pointer;transition:all 0.2s;
  border:none;background:transparent;letter-spacing:0.3px;
}
.view-tab:hover{color:var(--text-primary)}
.view-tab.active{background:var(--bg-elevated);color:var(--amber);box-shadow:0 1px 4px rgba(0,0,0,0.3)}

.header-spacer{flex:1}

.conn-badge{
  display:flex;align-items:center;gap:6px;
  font-size:11px;font-weight:600;letter-spacing:0.8px;
  padding:4px 12px;border-radius:12px;
  transition:all 0.3s;
}
.conn-badge .dot{
  width:8px;height:8px;border-radius:50%;
  animation:pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.4}}
.conn-live{background:rgba(16,185,129,0.15);color:var(--emerald)}
.conn-live .dot{background:var(--emerald)}
.conn-offline{background:rgba(239,68,68,0.15);color:var(--red)}
.conn-offline .dot{background:var(--red)}
.conn-connecting{background:rgba(245,166,35,0.15);color:var(--amber)}
.conn-connecting .dot{background:var(--amber)}

.health-pills{display:flex;gap:8px;margin-left:8px}
.health-pill{
  font-size:11px;color:var(--text-dim);
  display:flex;align-items:center;gap:4px;
}
.health-pill .val{font-weight:700;color:var(--text-primary)}

/* ══════════════════════════════════════════════════════════════════
   LEFT PANEL
   ══════════════════════════════════════════════════════════════════ */
.left-panel{
  grid-area:left;
  background:var(--bg-surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}

.metrics-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:1px;
  padding:12px;background:var(--bg-surface);
}
.metric-card{
  background:var(--bg-primary);border-radius:8px;padding:10px;
  text-align:center;position:relative;overflow:hidden;
}
.metric-card .mc-val{
  font-size:22px;font-weight:800;
  background:linear-gradient(135deg,var(--amber),#F59E0B);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1.2;
}
.metric-card .mc-val.emerald{
  background:linear-gradient(135deg,var(--emerald),#34D399);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.metric-card .mc-val.red-val{
  background:linear-gradient(135deg,var(--red),#F87171);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.metric-card .mc-val.blue-val{
  background:linear-gradient(135deg,var(--blue),#60A5FA);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.metric-card .mc-label{
  font-size:9px;text-transform:uppercase;letter-spacing:1px;
  color:var(--text-dim);margin-top:4px;
}

.section-title{
  font-size:10px;text-transform:uppercase;letter-spacing:1.5px;
  color:var(--text-dim);padding:10px 14px 6px;font-weight:600;
  display:flex;align-items:center;justify-content:space-between;
}
.section-title .count{
  font-size:9px;background:var(--bg-primary);padding:1px 6px;
  border-radius:8px;color:var(--amber);
}

.agent-list{
  flex:1;overflow-y:auto;padding:0 8px 8px;
}
.agent-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 8px;border-radius:6px;font-size:12px;
  cursor:pointer;transition:background 0.15s;
  border:1px solid transparent;
}
.agent-item:hover{background:var(--bg-elevated);border-color:var(--border)}
.agent-item.selected{background:var(--bg-elevated);border-color:var(--amber)}
.agent-item .ai-icon{font-size:14px;width:20px;text-align:center}
.agent-item .ai-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.agent-item .ai-status{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
}
.ai-status-active{background:var(--emerald);box-shadow:0 0 6px rgba(16,185,129,0.5)}
.ai-status-busy{background:var(--amber)}
.ai-status-error{background:var(--red)}
.ai-status-offline{background:var(--text-dim);opacity:0.5}

/* Pheromone summary mini bars */
.pheromone-summary{padding:8px 14px 12px}
.ph-row{
  display:flex;align-items:center;gap:6px;margin:3px 0;font-size:10px;
}
.ph-row .ph-type{width:48px;color:var(--text-dim);text-transform:capitalize}
.ph-row .ph-track{flex:1;height:4px;background:var(--bg-primary);border-radius:2px;overflow:hidden}
.ph-row .ph-fill{height:100%;border-radius:2px;transition:width 0.6s ease-out}
.ph-row .ph-count{width:28px;text-align:right;color:var(--text-dim);font-size:9px}

/* ══════════════════════════════════════════════════════════════════
   MAIN CANVAS AREA
   ══════════════════════════════════════════════════════════════════ */
.main-area{
  grid-area:main;
  position:relative;
  overflow:hidden;
  background:var(--bg-primary);
}

/* Off-screen buffer canvas (hidden) */
.main-area canvas{display:block}
#mainCanvas{position:absolute;top:0;left:0;width:100%;height:100%}

/* Glow overlay for active hex pulsing (CSS animation layer) */
.glow-overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:2;
}
.glow-pulse{
  position:absolute;border-radius:50%;
  animation:hex-breathe 3s ease-in-out infinite;
  pointer-events:none;
}
@keyframes hex-breathe{
  0%,100%{transform:scale(1);opacity:0.3}
  50%{transform:scale(1.3);opacity:0.08}
}

/* ══════════════════════════════════════════════════════════════════
   RIGHT PANEL
   ══════════════════════════════════════════════════════════════════ */
.right-panel{
  grid-area:right;
  background:var(--bg-surface);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}

.right-panel-content{flex:1;overflow-y:auto;padding:12px}

/* Agent detail card */
.detail-card{margin-bottom:12px}
.detail-card .dc-header{
  display:flex;align-items:center;gap:10px;margin-bottom:12px;
}
.detail-card .dc-icon{font-size:28px}
.detail-card .dc-info h3{font-size:14px;font-weight:700;color:var(--text-primary)}
.detail-card .dc-info .dc-persona{font-size:11px;color:var(--text-dim);text-transform:capitalize}
.detail-card .dc-info .dc-status{
  display:inline-block;font-size:9px;font-weight:700;letter-spacing:0.5px;
  padding:2px 8px;border-radius:4px;margin-top:2px;text-transform:uppercase;
}

/* Radar chart canvas */
.radar-container{
  width:100%;aspect-ratio:1;max-width:240px;margin:0 auto 16px;
}
.radar-container canvas{width:100%;height:100%}

/* Stats rows */
.stat-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;
}
.stat-row:last-child{border-bottom:none}
.stat-row .sr-label{color:var(--text-dim)}
.stat-row .sr-val{font-weight:700}

/* Success rate bar */
.success-bar{
  height:6px;background:var(--bg-primary);border-radius:3px;
  overflow:hidden;margin:8px 0;
}
.success-bar .sb-fill{height:100%;border-radius:3px;transition:width 0.4s}

/* Recent tasks list */
.task-list{margin-top:8px}
.task-item{
  display:flex;align-items:center;gap:8px;padding:5px 0;
  font-size:11px;border-bottom:1px solid rgba(42,42,74,0.5);
}
.task-item:last-child{border-bottom:none}
.task-item .ti-status{font-size:14px}
.task-item .ti-desc{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-dim)}
.task-item .ti-dur{color:var(--text-dim);font-size:10px}

/* Aggregate view (default right panel) */
.aggregate-section{margin-bottom:16px}
.aggregate-section h4{
  font-size:10px;text-transform:uppercase;letter-spacing:1px;
  color:var(--text-dim);margin-bottom:8px;font-weight:600;
}
.agg-row{
  display:flex;justify-content:space-between;padding:4px 0;
  font-size:12px;border-bottom:1px solid rgba(42,42,74,0.3);
}
.agg-row:last-child{border-bottom:none}
.agg-row .ar-val{font-weight:700}

/* ══════════════════════════════════════════════════════════════════
   FOOTER LOG STREAM
   ══════════════════════════════════════════════════════════════════ */
.footer-log{
  grid-area:footer;
  background:var(--bg-surface);
  border-top:1px solid var(--border);
  display:flex;flex-direction:column;
  max-height:200px;
  transition:max-height 0.3s ease;
}
.footer-log.collapsed{max-height:32px;overflow:hidden}

.log-header{
  display:flex;align-items:center;padding:6px 14px;gap:8px;
  cursor:pointer;user-select:none;flex-shrink:0;
}
.log-header .lh-title{
  font-size:10px;text-transform:uppercase;letter-spacing:1.5px;
  color:var(--text-dim);font-weight:600;
}
.log-header .lh-toggle{
  font-size:12px;color:var(--text-dim);transition:transform 0.3s;
}
.footer-log.collapsed .lh-toggle{transform:rotate(180deg)}
.log-header .lh-count{
  font-size:9px;color:var(--amber);background:var(--bg-primary);
  padding:1px 6px;border-radius:8px;margin-left:auto;
}

.log-entries{
  flex:1;overflow-y:auto;padding:0 14px 8px;
  font-family:var(--font-mono);font-size:11px;line-height:1.6;
}
.log-entry{
  padding:1px 8px;border-left:3px solid var(--border);
  margin:1px 0;border-radius:0 2px 2px 0;
  animation:log-slide 0.3s ease-out;
}
@keyframes log-slide{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
.log-entry.le-task{border-color:var(--blue)}
.log-entry.le-agent{border-color:var(--emerald)}
.log-entry.le-pheromone{border-color:var(--amber)}
.log-entry.le-quality{border-color:var(--purple)}
.log-entry.le-memory{border-color:#14B8A6}
.log-entry.le-error{border-color:var(--red);background:rgba(239,68,68,0.05)}
.log-entry .le-ts{color:var(--text-dim);margin-right:8px}
.log-entry .le-topic{font-weight:600;margin-right:6px}

/* ══════════════════════════════════════════════════════════════════
   UTILITY / MISC
   ══════════════════════════════════════════════════════════════════ */
.empty-state{
  text-align:center;padding:40px 20px;color:var(--text-dim);font-size:12px;
}
.empty-state .es-icon{font-size:32px;margin-bottom:8px;opacity:0.5}

.kbd{
  font-size:9px;background:var(--bg-primary);color:var(--text-dim);
  padding:1px 5px;border-radius:3px;border:1px solid var(--border);
  font-family:var(--font-mono);
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════
     HEADER
     ═══════════════════════════════════════════════════════════════ -->
<header>
  <div class="logo">
    <span style="font-size:22px">&#x1f41d;</span>
    Claw-Swarm
    <span class="version">V5.1</span>
  </div>

  <div class="view-tabs">
    <button class="view-tab active" data-view="hive" title="Hexagonal Hive View (1)">
      &#x2B21; Hive View
    </button>
    <button class="view-tab" data-view="dag" title="Task DAG View (2)">
      &#x2192; DAG View
    </button>
  </div>

  <div class="header-spacer"></div>

  <div class="health-pills">
    <div class="health-pill">Agents: <span class="val" id="hpAgents">0</span></div>
    <div class="health-pill">Tasks: <span class="val" id="hpTasks">0</span></div>
    <div class="health-pill">Err: <span class="val" id="hpErr">0%</span></div>
    <div class="health-pill">Avg: <span class="val" id="hpAvg">0ms</span></div>
  </div>

  <div class="conn-badge conn-connecting" id="connBadge">
    <span class="dot"></span>
    <span id="connText">CONNECTING</span>
  </div>
</header>

<!-- ═══════════════════════════════════════════════════════════════
     LEFT PANEL
     ═══════════════════════════════════════════════════════════════ -->
<div class="left-panel">
  <div class="metrics-grid">
    <div class="metric-card">
      <div class="mc-val emerald" id="mcActive">0</div>
      <div class="mc-label">Active</div>
    </div>
    <div class="metric-card">
      <div class="mc-val" id="mcDone">0</div>
      <div class="mc-label">Tasks Done</div>
    </div>
    <div class="metric-card">
      <div class="mc-val red-val" id="mcErrRate">0%</div>
      <div class="mc-label">Error Rate</div>
    </div>
    <div class="metric-card">
      <div class="mc-val blue-val" id="mcAvgDur">0ms</div>
      <div class="mc-label">Avg Duration</div>
    </div>
  </div>

  <div class="section-title">
    Agents <span class="count" id="agentCount">0</span>
  </div>
  <div class="agent-list" id="agentList">
    <div class="empty-state">
      <div class="es-icon">&#x1f41d;</div>
      No agents registered
    </div>
  </div>

  <div class="section-title">Pheromones</div>
  <div class="pheromone-summary" id="phSummary">
    <div class="ph-row"><span class="ph-type">trail</span><div class="ph-track"><div class="ph-fill" style="width:0%;background:var(--amber)"></div></div><span class="ph-count">0</span></div>
    <div class="ph-row"><span class="ph-type">alarm</span><div class="ph-track"><div class="ph-fill" style="width:0%;background:var(--red)"></div></div><span class="ph-count">0</span></div>
    <div class="ph-row"><span class="ph-type">recruit</span><div class="ph-track"><div class="ph-fill" style="width:0%;background:var(--blue)"></div></div><span class="ph-count">0</span></div>
    <div class="ph-row"><span class="ph-type">territory</span><div class="ph-track"><div class="ph-fill" style="width:0%;background:var(--purple)"></div></div><span class="ph-count">0</span></div>
    <div class="ph-row"><span class="ph-type">dance</span><div class="ph-track"><div class="ph-fill" style="width:0%;background:var(--emerald)"></div></div><span class="ph-count">0</span></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     MAIN CANVAS
     ═══════════════════════════════════════════════════════════════ -->
<div class="main-area" id="mainArea">
  <canvas id="mainCanvas"></canvas>
  <div class="glow-overlay" id="glowOverlay"></div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     RIGHT PANEL
     ═══════════════════════════════════════════════════════════════ -->
<div class="right-panel">
  <div class="section-title" id="rightTitle">Overview</div>
  <div class="right-panel-content" id="rightContent">
    <!-- Populated dynamically -->
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     FOOTER LOG STREAM
     ═══════════════════════════════════════════════════════════════ -->
<div class="footer-log" id="footerLog">
  <div class="log-header" id="logToggle">
    <span class="lh-title">Event Stream</span>
    <span class="lh-toggle">&#x25BC;</span>
    <span class="lh-count" id="logCount">0</span>
  </div>
  <div class="log-entries" id="logEntries"></div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════════
     JAVASCRIPT — Complete Dashboard Logic
     ═══════════════════════════════════════════════════════════════════════════ -->
<script>
(function() {
'use strict';

// ============================================================================
// Constants & Configuration
// ============================================================================
const TWO_PI = Math.PI * 2;
const HEX_ANGLE_OFFSET = Math.PI / 6; // flat-top hexagons
const PARTICLE_POOL_MAX = 200;
const PARTICLE_TRAIL_LEN = 3;
const LOG_MAX = 50;
const METRICS_POLL_MS = 5000;
const FRAME_INTERVAL = 1000 / 30; // 30fps cap
const SSE_BASE_DELAY = 1000;
const SSE_MAX_DELAY = 30000;

const PERSONA_COLORS = {
  'scout-bee':       '#3B82F6',
  'worker-bee':      '#10B981',
  'guard-bee':       '#EF4444',
  'queen-messenger': '#8B5CF6',
  'default':         '#F5A623'
};

const PERSONA_ICONS = {
  'scout-bee':       '\uD83D\uDD2D',  // telescope
  'worker-bee':      '\u2699\uFE0F',   // gear
  'guard-bee':       '\uD83D\uDEE1\uFE0F', // shield
  'queen-messenger': '\uD83D\uDC51',   // crown
  'default':         '\uD83D\uDC1D'    // bee
};

const PHEROMONE_COLORS = {
  trail:     '#F5A623',
  alarm:     '#EF4444',
  recruit:   '#3B82F6',
  territory: '#8B5CF6',
  queen:     '#8B5CF6',
  dance:     '#10B981'
};

const CAPABILITY_AXES = [
  'Analysis', 'Coding', 'Design', 'Testing',
  'Ops', 'Security', 'Data', 'Communication'
];

// ============================================================================
// Utility Functions
// ============================================================================
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${a})`;
}
function shortId(id) {
  if (!id) return '?';
  return id.length > 16 ? id.slice(0, 14) + '\u2026' : id;
}
function fmtTime(ts) {
  const d = ts ? new Date(ts) : new Date();
  return d.toTimeString().slice(0, 8);
}
function fmtDuration(ms) {
  if (!ms && ms !== 0) return '--';
  if (ms < 1000) return ms + 'ms';
  return (ms / 1000).toFixed(1) + 's';
}
function personaColor(p) { return PERSONA_COLORS[p] || PERSONA_COLORS['default']; }
function personaIcon(p) { return PERSONA_ICONS[p] || PERSONA_ICONS['default']; }

// ============================================================================
// State
// ============================================================================
const state = {
  // Core data
  agents: new Map(),          // agentId -> AgentRecord
  tasks: new Map(),           // taskId -> TaskRecord
  recentTasks: [],
  recentMemoryOps: [],
  qualityEvals: [],
  pheromonesByType: { trail: 0, alarm: 0, recruit: 0, territory: 0, dance: 0 },
  swarm: { tasksCompleted: 0, tasksFailed: 0, pheromoneEvents: 0, memoryEvents: 0 },
  red: { rate: 0, errorRate: 0, avgDuration: 0 },

  // UI state
  activeView: 'hive',        // 'hive' | 'dag'
  selectedAgentId: null,
  selectedTaskId: null,
  logEntries: [],
  logCollapsed: false,

  // Canvas animation state
  particles: [],              // particle pool
  particleFreeList: [],       // recycled particles
  hexPositions: [],           // computed hex positions [{x,y,agentId}]
  dagNodes: [],               // computed DAG layout

  // Connection
  sseConnected: false,
  sseRetryDelay: SSE_BASE_DELAY,
};

// ============================================================================
// DOM References
// ============================================================================
const canvas = $('#mainCanvas');
const ctx = canvas.getContext('2d');
const mainArea = $('#mainArea');
const glowOverlay = $('#glowOverlay');
const logEntriesEl = $('#logEntries');

// Double buffer - off-screen canvas
const bufferCanvas = document.createElement('canvas');
const bufCtx = bufferCanvas.getContext('2d');

let canvasW = 0, canvasH = 0, dpr = 1;
let lastFrameTime = 0;
let animationId = null;

// ============================================================================
// Canvas Resize
// ============================================================================
function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  const rect = mainArea.getBoundingClientRect();
  canvasW = rect.width;
  canvasH = rect.height;

  canvas.width = canvasW * dpr;
  canvas.height = canvasH * dpr;
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';

  bufferCanvas.width = canvas.width;
  bufferCanvas.height = canvas.height;

  computeHexLayout();
  computeDAGLayout();
}

window.addEventListener('resize', resizeCanvas);

// ============================================================================
// Hexagonal Hive Layout
// ============================================================================
function computeHexLayout() {
  const agents = [...state.agents.values()].filter(a => a.status !== 'offline');
  const n = agents.length;
  if (n === 0) { state.hexPositions = []; return; }

  // Compute hex size to fit viewport
  const padding = 60;
  const availW = canvasW - padding * 2;
  const availH = canvasH - padding * 2;

  // Determine grid dimensions for honeycomb
  const cols = Math.ceil(Math.sqrt(n * 1.5));
  const rows = Math.ceil(n / cols);

  // Hex size calculation
  const hexW = availW / (cols + 0.5);
  const hexH = availH / rows;
  const hexSize = Math.min(hexW / Math.sqrt(3), hexH / 2, 60);
  const actualHexW = hexSize * Math.sqrt(3);
  const actualHexH = hexSize * 2;

  // Center the grid
  const gridW = cols * actualHexW + actualHexW * 0.5;
  const gridH = rows * actualHexH * 0.75 + actualHexH * 0.25;
  const offsetX = (canvasW - gridW) / 2 + actualHexW * 0.5;
  const offsetY = (canvasH - gridH) / 2 + hexSize;

  // Sort: queen first (center), then by persona
  const sorted = agents.slice().sort((a, b) => {
    if (a.persona === 'queen-messenger') return -1;
    if (b.persona === 'queen-messenger') return 1;
    return (a.persona || '').localeCompare(b.persona || '');
  });

  // Spiral outward from center for hex placement
  const centerCol = Math.floor(cols / 2);
  const centerRow = Math.floor(rows / 2);
  const positions = [];
  const visited = new Set();

  // BFS spiral from center
  const queue = [[centerCol, centerRow]];
  visited.add(`${centerCol},${centerRow}`);
  let idx = 0;

  while (queue.length > 0 && idx < sorted.length) {
    const [c, r] = queue.shift();
    const x = offsetX + c * actualHexW + (r % 2 === 1 ? actualHexW * 0.5 : 0);
    const y = offsetY + r * actualHexH * 0.75;

    positions.push({
      x, y, size: hexSize,
      agentId: sorted[idx].id,
      agent: sorted[idx],
      targetX: x, targetY: y,
      currentX: sorted[idx]._hexX != null ? sorted[idx]._hexX : x,
      currentY: sorted[idx]._hexY != null ? sorted[idx]._hexY : y,
    });
    sorted[idx]._hexX = x;
    sorted[idx]._hexY = y;
    idx++;

    // Neighbors (hex grid)
    const neighbors = r % 2 === 0
      ? [[c-1,r],[c+1,r],[c-1,r-1],[c,r-1],[c-1,r+1],[c,r+1]]
      : [[c-1,r],[c+1,r],[c,r-1],[c+1,r-1],[c,r+1],[c+1,r+1]];

    for (const [nc, nr] of neighbors) {
      const key = `${nc},${nr}`;
      if (!visited.has(key) && nc >= 0 && nc < cols && nr >= 0 && nr < rows) {
        visited.add(key);
        queue.push([nc, nr]);
      }
    }
  }

  state.hexPositions = positions;
}

// ============================================================================
// DAG Layout
// ============================================================================
function computeDAGLayout() {
  const tasks = [...state.tasks.values()];
  if (tasks.length === 0) { state.dagNodes = []; return; }

  // Simple left-to-right layout by creation order
  const padding = 80;
  const nodeW = 160;
  const nodeH = 48;
  const gapX = 40;
  const gapY = 20;

  // Group by status order: pending, executing, completed, failed
  const statusOrder = { 'pending': 0, 'started': 1, 'executing': 1, 'completed': 2, 'failed': 3 };
  const sorted = tasks.slice().sort((a, b) => (statusOrder[a.status] || 0) - (statusOrder[b.status] || 0));

  const cols = Math.ceil(Math.sqrt(sorted.length * 2));
  const nodes = [];

  sorted.forEach((task, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    nodes.push({
      x: padding + col * (nodeW + gapX),
      y: padding + row * (nodeH + gapY),
      w: nodeW,
      h: nodeH,
      task: task,
      taskId: task.taskId,
    });
  });

  state.dagNodes = nodes;
}

// ============================================================================
// Particle Object Pool
// ============================================================================
function spawnParticle(fromX, fromY, toX, toY, color, type) {
  let p;
  if (state.particleFreeList.length > 0) {
    p = state.particleFreeList.pop();
  } else if (state.particles.length < PARTICLE_POOL_MAX) {
    p = { fx: 0, fy: 0, tx: 0, ty: 0, cx: 0, cy: 0, progress: 0, speed: 0, color: '', type: '', size: 0, trail: [], alive: false };
  } else {
    return; // pool full
  }

  // Bezier control point (perpendicular offset)
  const mx = (fromX + toX) / 2;
  const my = (fromY + toY) / 2;
  const dx = toX - fromX;
  const dy = toY - fromY;
  const offset = (Math.random() - 0.5) * 80;

  p.fx = fromX;
  p.fy = fromY;
  p.tx = toX;
  p.ty = toY;
  p.cx = mx + (-dy / (Math.hypot(dx, dy) || 1)) * offset;
  p.cy = my + (dx / (Math.hypot(dx, dy) || 1)) * offset;
  p.progress = 0;
  p.speed = 0.008 + Math.random() * 0.012;
  p.color = color;
  p.type = type || 'trail';
  p.size = 2 + Math.random() * 2;
  p.trail = [];
  p.alive = true;

  state.particles.push(p);
}

function recycleParticle(p) {
  p.alive = false;
  state.particleFreeList.push(p);
}

function quadBezier(p0x, p0y, p1x, p1y, p2x, p2y, t) {
  const u = 1 - t;
  return {
    x: u * u * p0x + 2 * u * t * p1x + t * t * p2x,
    y: u * u * p0y + 2 * u * t * p1y + t * t * p2y,
  };
}

// ============================================================================
// Rendering — Hexagonal Hive View
// ============================================================================
function drawHexPath(ctx, cx, cy, size) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = TWO_PI / 6 * i - Math.PI / 2;
    const hx = cx + size * Math.cos(angle);
    const hy = cy + size * Math.sin(angle);
    if (i === 0) ctx.moveTo(hx, hy);
    else ctx.lineTo(hx, hy);
  }
  ctx.closePath();
}

function renderHiveView(ctx, w, h, time) {
  // Clear
  ctx.fillStyle = '#0F0F23';
  ctx.fillRect(0, 0, w * dpr, h * dpr);
  ctx.save();
  ctx.scale(dpr, dpr);

  const positions = state.hexPositions;

  // Ambient honeycomb background pattern
  drawHoneycombBg(ctx, w, h, time);

  if (positions.length === 0) {
    ctx.fillStyle = '#8888AA';
    ctx.font = '14px ' + 'Segoe UI, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.globalAlpha = 0.5;
    ctx.fillText('Waiting for swarm activity\u2026', w / 2, h / 2 - 10);
    ctx.font = '10px ' + 'Segoe UI, system-ui, sans-serif';
    ctx.fillText('Agents will appear as hexagonal cells', w / 2, h / 2 + 12);
    ctx.globalAlpha = 1;

    // Floating ambient particles
    drawAmbientParticles(ctx, w, h, time);
    ctx.restore();
    return;
  }

  // Draw connections between agents of same persona
  ctx.strokeStyle = hexToRgba('#2A2A4A', 0.4);
  ctx.lineWidth = 1;
  for (let i = 0; i < positions.length; i++) {
    for (let j = i + 1; j < positions.length; j++) {
      if (positions[i].agent.persona === positions[j].agent.persona) {
        const d = Math.hypot(positions[i].x - positions[j].x, positions[i].y - positions[j].y);
        if (d < positions[i].size * 5) {
          ctx.globalAlpha = 0.15;
          ctx.beginPath();
          ctx.moveTo(positions[i].x, positions[i].y);
          ctx.lineTo(positions[j].x, positions[j].y);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
      }
    }
  }

  // Draw particles
  renderParticles(ctx, time);

  // Draw hex cells
  for (const pos of positions) {
    const agent = pos.agent;
    const color = personaColor(agent.persona);
    const icon = personaIcon(agent.persona);
    const isSelected = state.selectedAgentId === agent.id;
    const size = pos.size;

    // Smooth position interpolation
    pos.currentX = lerp(pos.currentX, pos.targetX, 0.1);
    pos.currentY = lerp(pos.currentY, pos.targetY, 0.1);
    const cx = pos.currentX;
    const cy = pos.currentY;

    // Glow aura
    if (agent.status === 'active' || agent.status === 'busy') {
      const pulse = 0.6 + 0.4 * Math.sin(time * 0.002 + agent._phase);
      const glowSize = size * 1.6 * pulse;
      const grad = ctx.createRadialGradient(cx, cy, size * 0.5, cx, cy, glowSize);
      grad.addColorStop(0, hexToRgba(color, 0.2 * pulse));
      grad.addColorStop(1, hexToRgba(color, 0));
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, glowSize, 0, TWO_PI);
      ctx.fill();
    }

    // Hex fill
    drawHexPath(ctx, cx, cy, size);
    ctx.fillStyle = hexToRgba(color, 0.15);
    ctx.fill();

    // Hex border
    drawHexPath(ctx, cx, cy, size);
    ctx.strokeStyle = isSelected ? '#FFFFFF' : color;
    ctx.lineWidth = isSelected ? 3 : 2;
    ctx.stroke();

    // Selected highlight
    if (isSelected) {
      drawHexPath(ctx, cx, cy, size + 4);
      ctx.strokeStyle = hexToRgba(color, 0.4);
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Icon (emoji)
    ctx.font = Math.floor(size * 0.55) + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(icon, cx, cy - 2);

    // Agent ID below icon
    ctx.font = 'bold ' + Math.max(8, Math.floor(size * 0.22)) + 'px ' + 'Segoe UI, system-ui, sans-serif';
    ctx.fillStyle = '#E8E8F0';
    ctx.textBaseline = 'top';
    ctx.fillText(shortId(agent.id), cx, cy + size * 0.35);

    // Status dot (top-right)
    const dotX = cx + size * 0.65;
    const dotY = cy - size * 0.65;
    const dotR = Math.max(3, size * 0.1);
    ctx.beginPath();
    ctx.arc(dotX, dotY, dotR, 0, TWO_PI);
    ctx.fillStyle = agent.status === 'active' ? '#10B981'
                  : agent.status === 'busy'   ? '#F5A623'
                  : agent.status === 'error'  ? '#EF4444'
                  : '#555577';
    ctx.fill();

    // Active dot glow
    if (agent.status === 'active') {
      ctx.beginPath();
      ctx.arc(dotX, dotY, dotR * 2, 0, TWO_PI);
      ctx.fillStyle = hexToRgba('#10B981', 0.2);
      ctx.fill();
    }
  }

  ctx.restore();
}

function drawHoneycombBg(ctx, w, h, time) {
  const size = 30;
  const hexW = size * Math.sqrt(3);
  const hexH = size * 2;
  ctx.strokeStyle = hexToRgba('#2A2A4A', 0.08);
  ctx.lineWidth = 0.5;
  const cols = Math.ceil(w / hexW) + 2;
  const rows = Math.ceil(h / (hexH * 0.75)) + 2;
  const drift = time * 0.003;

  for (let r = -1; r < rows; r++) {
    for (let c = -1; c < cols; c++) {
      const cx = c * hexW + (r % 2 === 1 ? hexW * 0.5 : 0);
      const cy = r * hexH * 0.75;
      drawHexPath(ctx, cx, cy, size);
      ctx.stroke();
    }
  }
}

function drawAmbientParticles(ctx, w, h, time) {
  const t = time * 0.001;
  for (let i = 0; i < 8; i++) {
    const ax = w / 2 + Math.cos(t * 0.7 + i * 0.785) * 100 * Math.sin(t * 0.3 + i);
    const ay = h / 2 + Math.sin(t * 0.7 + i * 0.785) * 70 * Math.cos(t * 0.2 + i);
    const pulse = 0.15 + 0.1 * Math.sin(t * 2 + i);
    ctx.fillStyle = hexToRgba('#F5A623', pulse);
    ctx.beginPath();
    ctx.arc(ax, ay, 3, 0, TWO_PI);
    ctx.fill();
  }
}

// ============================================================================
// Rendering — Particles
// ============================================================================
function renderParticles(ctx, time) {
  for (let i = state.particles.length - 1; i >= 0; i--) {
    const p = state.particles[i];
    if (!p.alive) { state.particles.splice(i, 1); continue; }

    p.progress += p.speed;
    if (p.progress >= 1) {
      state.particles.splice(i, 1);
      recycleParticle(p);
      continue;
    }

    const pos = quadBezier(p.fx, p.fy, p.cx, p.cy, p.tx, p.ty, p.progress);

    // Update trail
    p.trail.push({ x: pos.x, y: pos.y });
    if (p.trail.length > PARTICLE_TRAIL_LEN) p.trail.shift();

    // Draw trail with fading opacity
    if (p.trail.length > 1) {
      for (let j = 1; j < p.trail.length; j++) {
        const alpha = (j / p.trail.length) * 0.5;
        ctx.strokeStyle = hexToRgba(p.color, alpha);
        ctx.lineWidth = p.size * 0.6;
        ctx.beginPath();
        ctx.moveTo(p.trail[j - 1].x, p.trail[j - 1].y);
        ctx.lineTo(p.trail[j].x, p.trail[j].y);
        ctx.stroke();
      }
    }

    // Draw head
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, p.size, 0, TWO_PI);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// ============================================================================
// Rendering — Task DAG View
// ============================================================================
function renderDAGView(ctx, w, h, time) {
  ctx.fillStyle = '#0F0F23';
  ctx.fillRect(0, 0, w * dpr, h * dpr);
  ctx.save();
  ctx.scale(dpr, dpr);

  const nodes = state.dagNodes;

  if (nodes.length === 0) {
    ctx.fillStyle = '#8888AA';
    ctx.font = '14px ' + 'Segoe UI, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.globalAlpha = 0.5;
    ctx.fillText('No tasks in DAG', w / 2, h / 2 - 10);
    ctx.font = '10px ' + 'Segoe UI, system-ui, sans-serif';
    ctx.fillText('Tasks will appear as nodes connected by dependencies', w / 2, h / 2 + 12);
    ctx.globalAlpha = 1;
    drawAmbientParticles(ctx, w, h, time);
    ctx.restore();
    return;
  }

  const STATUS_COLORS = {
    pending: '#555577',
    started: '#3B82F6',
    executing: '#3B82F6',
    completed: '#10B981',
    failed: '#EF4444',
  };

  // Draw arrows between sequential tasks
  ctx.strokeStyle = hexToRgba('#2A2A4A', 0.5);
  ctx.lineWidth = 1.5;
  for (let i = 0; i < nodes.length - 1; i++) {
    const from = nodes[i];
    const to = nodes[i + 1];
    if (Math.abs(from.y - to.y) < to.h) {
      // Same row — horizontal arrow
      ctx.beginPath();
      ctx.moveTo(from.x + from.w, from.y + from.h / 2);
      ctx.lineTo(to.x, to.y + to.h / 2);
      ctx.stroke();

      // Arrowhead
      const ax = to.x - 6;
      const ay = to.y + to.h / 2;
      ctx.fillStyle = '#2A2A4A';
      ctx.beginPath();
      ctx.moveTo(to.x, ay);
      ctx.lineTo(ax, ay - 4);
      ctx.lineTo(ax, ay + 4);
      ctx.closePath();
      ctx.fill();
    }
  }

  // Draw nodes
  for (const node of nodes) {
    const task = node.task;
    const color = STATUS_COLORS[task.status] || STATUS_COLORS.pending;
    const isSelected = state.selectedTaskId === task.taskId;
    const r = 8; // border radius

    // Critical path glow for executing tasks
    if (task.status === 'executing' || task.status === 'started') {
      const pulse = 0.4 + 0.3 * Math.sin(time * 0.003);
      ctx.shadowColor = color;
      ctx.shadowBlur = 12 * pulse;
    }

    // Node background
    ctx.fillStyle = hexToRgba(color, 0.12);
    ctx.strokeStyle = isSelected ? '#FFFFFF' : color;
    ctx.lineWidth = isSelected ? 2.5 : 1.5;

    // Rounded rect
    ctx.beginPath();
    ctx.moveTo(node.x + r, node.y);
    ctx.lineTo(node.x + node.w - r, node.y);
    ctx.quadraticCurveTo(node.x + node.w, node.y, node.x + node.w, node.y + r);
    ctx.lineTo(node.x + node.w, node.y + node.h - r);
    ctx.quadraticCurveTo(node.x + node.w, node.y + node.h, node.x + node.w - r, node.y + node.h);
    ctx.lineTo(node.x + r, node.y + node.h);
    ctx.quadraticCurveTo(node.x, node.y + node.h, node.x, node.y + node.h - r);
    ctx.lineTo(node.x, node.y + r);
    ctx.quadraticCurveTo(node.x, node.y, node.x + r, node.y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Status icon
    const statusIcon = task.status === 'completed' ? '\u2713'
                     : task.status === 'failed'    ? '\u2717'
                     : task.status === 'executing' || task.status === 'started' ? '\u25B6'
                     : '\u25CB';
    ctx.fillStyle = color;
    ctx.font = '14px ' + 'Segoe UI, system-ui, sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(statusIcon, node.x + 10, node.y + node.h / 2);

    // Task label
    ctx.fillStyle = '#E8E8F0';
    ctx.font = '11px ' + 'Segoe UI, system-ui, sans-serif';
    const label = (task.description || task.taskId || '?').slice(0, 20);
    ctx.fillText(label, node.x + 28, node.y + node.h / 2 - 6);

    // Agent attribution
    if (task.agentId) {
      ctx.fillStyle = '#8888AA';
      ctx.font = '9px ' + 'Segoe UI, system-ui, sans-serif';
      ctx.fillText(shortId(task.agentId), node.x + 28, node.y + node.h / 2 + 8);
    }
  }

  // Draw particles over DAG
  renderParticles(ctx, time);

  ctx.restore();
}

// ============================================================================
// Rendering — Radar Chart (Agent Capability)
// ============================================================================
function drawRadarChart(canvasEl, capabilities) {
  const size = canvasEl.width;
  const rCtx = canvasEl.getContext('2d');
  const dp = window.devicePixelRatio || 1;

  canvasEl.width = 220 * dp;
  canvasEl.height = 220 * dp;
  canvasEl.style.width = '220px';
  canvasEl.style.height = '220px';
  rCtx.scale(dp, dp);

  const cx = 110, cy = 110, radius = 80;
  const axes = CAPABILITY_AXES;
  const n = axes.length;

  rCtx.clearRect(0, 0, 220, 220);

  // Web rings
  for (let ring = 1; ring <= 4; ring++) {
    const r = radius * ring / 4;
    rCtx.strokeStyle = hexToRgba('#2A2A4A', 0.6);
    rCtx.lineWidth = 0.5;
    rCtx.beginPath();
    for (let i = 0; i <= n; i++) {
      const angle = (TWO_PI / n) * i - Math.PI / 2;
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      if (i === 0) rCtx.moveTo(x, y);
      else rCtx.lineTo(x, y);
    }
    rCtx.stroke();
  }

  // Axis lines
  for (let i = 0; i < n; i++) {
    const angle = (TWO_PI / n) * i - Math.PI / 2;
    rCtx.strokeStyle = hexToRgba('#2A2A4A', 0.4);
    rCtx.lineWidth = 0.5;
    rCtx.beginPath();
    rCtx.moveTo(cx, cy);
    rCtx.lineTo(cx + radius * Math.cos(angle), cy + radius * Math.sin(angle));
    rCtx.stroke();

    // Label
    const lx = cx + (radius + 16) * Math.cos(angle);
    const ly = cy + (radius + 16) * Math.sin(angle);
    rCtx.fillStyle = '#8888AA';
    rCtx.font = '9px Segoe UI, system-ui, sans-serif';
    rCtx.textAlign = 'center';
    rCtx.textBaseline = 'middle';
    rCtx.fillText(axes[i], lx, ly);
  }

  // Data polygon
  const values = axes.map((_, i) => capabilities[i] != null ? capabilities[i] : Math.random() * 0.6 + 0.2);
  rCtx.fillStyle = hexToRgba('#F5A623', 0.15);
  rCtx.strokeStyle = '#F5A623';
  rCtx.lineWidth = 2;
  rCtx.beginPath();
  for (let i = 0; i <= n; i++) {
    const idx = i % n;
    const angle = (TWO_PI / n) * idx - Math.PI / 2;
    const r = radius * clamp(values[idx], 0, 1);
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    if (i === 0) rCtx.moveTo(x, y);
    else rCtx.lineTo(x, y);
  }
  rCtx.fill();
  rCtx.stroke();

  // Data points
  for (let i = 0; i < n; i++) {
    const angle = (TWO_PI / n) * i - Math.PI / 2;
    const r = radius * clamp(values[i], 0, 1);
    rCtx.fillStyle = '#F5A623';
    rCtx.beginPath();
    rCtx.arc(cx + r * Math.cos(angle), cy + r * Math.sin(angle), 3, 0, TWO_PI);
    rCtx.fill();
  }
}

// ============================================================================
// Main Animation Loop — 30fps with Double Buffering
// ============================================================================
function animate(time) {
  animationId = requestAnimationFrame(animate);

  // 30fps cap
  if (time - lastFrameTime < FRAME_INTERVAL) return;
  lastFrameTime = time;

  if (canvasW === 0 || canvasH === 0) return;

  // Render to off-screen buffer
  if (state.activeView === 'hive') {
    renderHiveView(bufCtx, canvasW, canvasH, time);
  } else {
    renderDAGView(bufCtx, canvasW, canvasH, time);
  }

  // Swap — blit buffer to screen
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(bufferCanvas, 0, 0);
}

// ============================================================================
// SSE Connection with Reconnect Backoff
// ============================================================================
let evtSource = null;

function connectSSE() {
  if (evtSource) { evtSource.close(); evtSource = null; }

  setConnectionState('connecting');
  evtSource = new EventSource('/events');

  evtSource.onopen = function() {
    state.sseConnected = true;
    state.sseRetryDelay = SSE_BASE_DELAY;
    setConnectionState('live');
  };

  evtSource.onerror = function() {
    state.sseConnected = false;
    setConnectionState('offline');
    evtSource.close();
    evtSource = null;
    // Reconnect with exponential backoff
    setTimeout(connectSSE, state.sseRetryDelay);
    state.sseRetryDelay = Math.min(state.sseRetryDelay * 2, SSE_MAX_DELAY);
  };

  evtSource.onmessage = function(e) {
    try {
      const msg = JSON.parse(e.data);
      routeEvent(msg.topic || '', msg.data || msg, msg.timestamp || Date.now());
    } catch (_) {}
  };
}

function setConnectionState(s) {
  const badge = $('#connBadge');
  const text = $('#connText');
  badge.className = 'conn-badge conn-' + s;
  text.textContent = s === 'live' ? 'LIVE' : s === 'offline' ? 'OFFLINE' : 'CONNECTING';
}

// ============================================================================
// Event Router
// ============================================================================
function routeEvent(topic, data, ts) {
  const logType = topic.startsWith('task.')      ? 'task'
               : topic.startsWith('agent.')     ? 'agent'
               : topic.startsWith('pheromone.') ? 'pheromone'
               : topic.startsWith('quality.')   ? 'quality'
               : topic.startsWith('memory.')    ? 'memory'
               : '';

  addLogEntry(topic, data, logType, ts);

  if (topic === 'agent.registered')      onAgentRegistered(data);
  else if (topic === 'agent.end')        onAgentEnd(data);
  else if (topic === 'task.completed')   onTaskCompleted(data);
  else if (topic === 'task.failed')      onTaskFailed(data);
  else if (topic === 'task.started')     onTaskStarted(data);
  else if (topic === 'pheromone.emitted') onPheromone(data);
  else if (topic === 'quality.evaluated') onQualityEval(data);
  else if (topic.startsWith('memory.'))  onMemoryEvent(topic, data);
  else if (topic.startsWith('species.')) onSpeciesEvent(topic, data);
  else if (topic.startsWith('agent.'))   onAgentGeneric(topic, data);
}

// ============================================================================
// Event Handlers
// ============================================================================
function onAgentRegistered(data) {
  const id = data.agentId || data.id;
  if (!id) return;
  if (!state.agents.has(id)) {
    state.agents.set(id, {
      id,
      persona: data.persona || 'default',
      tier: data.tier || '',
      status: data.status || 'active',
      tasks: [],
      successCount: 0,
      failCount: 0,
      qualityScores: [],
      capabilities: null,
      _phase: Math.random() * TWO_PI,
      _hexX: null,
      _hexY: null,
    });
  } else {
    const a = state.agents.get(id);
    a.status = data.status || 'active';
    if (data.persona) a.persona = data.persona;
    if (data.tier) a.tier = data.tier;
  }
  refreshLeftPanel();
  computeHexLayout();
}

function onAgentEnd(data) {
  const id = data.agentId || data.id;
  if (!id) return;
  const a = state.agents.get(id);
  if (a) a.status = 'offline';
  refreshLeftPanel();
  computeHexLayout();
  if (state.selectedAgentId === id) refreshRightPanel();
}

function onAgentGeneric(topic, data) {
  const id = data.agentId || data.id;
  if (id && !state.agents.has(id)) {
    onAgentRegistered(data);
  }
}

function onTaskStarted(data) {
  const id = data.taskId || data.id;
  if (!id) return;
  state.tasks.set(id, {
    taskId: id,
    agentId: data.agentId,
    description: data.description || id,
    status: 'executing',
    startTime: Date.now(),
    duration: null,
  });
  if (data.agentId) {
    const a = state.agents.get(data.agentId);
    if (a) { a.status = 'busy'; refreshLeftPanel(); }
  }
  computeDAGLayout();
}

function onTaskCompleted(data) {
  const id = data.taskId || data.id;
  state.swarm.tasksCompleted++;
  if (id && state.tasks.has(id)) {
    const t = state.tasks.get(id);
    t.status = 'completed';
    t.duration = data.duration || (Date.now() - (t.startTime || Date.now()));
  } else if (id) {
    state.tasks.set(id, {
      taskId: id, agentId: data.agentId, description: data.description || id,
      status: 'completed', duration: data.duration, startTime: null,
    });
  }
  // Update agent stats
  if (data.agentId) {
    const a = state.agents.get(data.agentId);
    if (a) {
      a.successCount++;
      a.tasks.push({ taskId: id, status: 'completed', description: data.description, duration: data.duration });
      if (a.tasks.length > 20) a.tasks.shift();
      a.status = 'active';
    }
  }
  state.recentTasks.push({ taskId: id, agentId: data.agentId, description: data.description, status: 'completed', duration: data.duration, ts: Date.now() });
  if (state.recentTasks.length > 30) state.recentTasks.shift();

  spawnTaskParticles(data, 'completed');
  refreshLeftPanel();
  computeDAGLayout();
  if (state.selectedAgentId === data.agentId) refreshRightPanel();
}

function onTaskFailed(data) {
  const id = data.taskId || data.id;
  state.swarm.tasksFailed++;
  if (id && state.tasks.has(id)) {
    state.tasks.get(id).status = 'failed';
  } else if (id) {
    state.tasks.set(id, {
      taskId: id, agentId: data.agentId, description: data.description || id,
      status: 'failed', duration: null, startTime: null,
    });
  }
  if (data.agentId) {
    const a = state.agents.get(data.agentId);
    if (a) {
      a.failCount++;
      a.tasks.push({ taskId: id, status: 'failed', description: data.description });
      if (a.tasks.length > 20) a.tasks.shift();
      a.status = 'active';
    }
  }
  state.recentTasks.push({ taskId: id, agentId: data.agentId, description: data.description, status: 'failed', ts: Date.now() });
  if (state.recentTasks.length > 30) state.recentTasks.shift();

  spawnTaskParticles(data, 'failed');
  refreshLeftPanel();
  computeDAGLayout();
  if (state.selectedAgentId === data.agentId) refreshRightPanel();
}

function onPheromone(data) {
  state.swarm.pheromoneEvents++;
  const pType = data.type || 'trail';
  const key = pType === 'queen' ? 'territory' : (state.pheromonesByType[pType] != null ? pType : 'trail');
  state.pheromonesByType[key] = (state.pheromonesByType[key] || 0) + 1;
  updatePheromoneUI();

  // Spawn particles between random hex positions
  const positions = state.hexPositions;
  if (positions.length >= 2) {
    const a = positions[Math.floor(Math.random() * positions.length)];
    let b = positions[Math.floor(Math.random() * positions.length)];
    if (a === b) b = positions[(positions.indexOf(a) + 1) % positions.length];
    spawnParticle(a.x, a.y, b.x, b.y, PHEROMONE_COLORS[pType] || '#F5A623', pType);
  }
}

function onQualityEval(data) {
  const ev = {
    agentId: data.agentId || 'unknown',
    score: data.score || 0,
    passed: data.passed != null ? data.passed : (data.score >= 0.6),
    ts: Date.now(),
  };
  state.qualityEvals.unshift(ev);
  if (state.qualityEvals.length > 30) state.qualityEvals.pop();

  if (data.agentId) {
    const a = state.agents.get(data.agentId);
    if (a) {
      a.qualityScores.push(ev.score);
      if (a.qualityScores.length > 20) a.qualityScores.shift();
    }
  }
  if (state.selectedAgentId === data.agentId) refreshRightPanel();
}

function onMemoryEvent(topic, data) {
  state.swarm.memoryEvents++;
  state.recentMemoryOps.push({
    topic, action: data.action, layer: data.layer, agentId: data.agentId, ts: Date.now()
  });
  if (state.recentMemoryOps.length > 30) state.recentMemoryOps.shift();
}

function onSpeciesEvent(topic, data) {
  // Just log it
}

function spawnTaskParticles(data, status) {
  const positions = state.hexPositions;
  if (positions.length < 2) return;

  // Find the agent's hex position
  let fromPos = null;
  if (data.agentId) {
    fromPos = positions.find(p => p.agentId === data.agentId);
  }
  if (!fromPos) fromPos = positions[Math.floor(Math.random() * positions.length)];

  const toPos = positions[Math.floor(Math.random() * positions.length)];
  const color = status === 'completed' ? '#10B981' : '#EF4444';
  spawnParticle(fromPos.x, fromPos.y, toPos.x, toPos.y, color, 'task');
}

// UI Update Functions
// ============================================================================
function refreshLeftPanel() {
  const agents = [...state.agents.values()];
  const active = agents.filter(a => a.status !== 'offline');

  // Metric cards
  $('#mcActive').textContent = active.length;
  $('#mcDone').textContent = state.swarm.tasksCompleted;
  const total = state.swarm.tasksCompleted + state.swarm.tasksFailed;
  const errRate = total > 0 ? ((state.swarm.tasksFailed / total) * 100).toFixed(1) : '0';
  $('#mcErrRate').textContent = errRate + '%';
  $('#mcAvgDur').textContent = fmtDuration(state.red.avgDuration);

  // Header pills
  $('#hpAgents').textContent = active.length;
  $('#hpTasks').textContent = state.swarm.tasksCompleted;
  $('#hpErr').textContent = errRate + '%';
  $('#hpAvg').textContent = fmtDuration(state.red.avgDuration);

  // Agent count
  $('#agentCount').textContent = agents.length;

  // Agent list
  const listEl = $('#agentList');
  if (agents.length === 0) {
    listEl.innerHTML = '<div class="empty-state"><div class="es-icon">&#x1f41d;</div>No agents registered</div>';
    return;
  }

  listEl.innerHTML = agents.map(a => {
    const icon = personaIcon(a.persona);
    const statusCls = a.status === 'active' ? 'ai-status-active'
                    : a.status === 'busy'   ? 'ai-status-busy'
                    : a.status === 'error'  ? 'ai-status-error'
                    : 'ai-status-offline';
    const selected = state.selectedAgentId === a.id ? ' selected' : '';
    return `<div class="agent-item${selected}" data-agent-id="${a.id}">
      <span class="ai-icon">${icon}</span>
      <span class="ai-name">${shortId(a.id)}</span>
      <span class="ai-status ${statusCls}"></span>
    </div>`;
  }).join('');

  // Click handlers
  listEl.querySelectorAll('.agent-item').forEach(el => {
    el.addEventListener('click', function() {
      const id = this.dataset.agentId;
      state.selectedAgentId = state.selectedAgentId === id ? null : id;
      state.selectedTaskId = null;
      refreshLeftPanel();
      refreshRightPanel();
    });
  });
}

function updatePheromoneUI() {
  const types = ['trail', 'alarm', 'recruit', 'territory', 'dance'];
  const max = Math.max(1, ...types.map(t => state.pheromonesByType[t] || 0));
  const rows = $('#phSummary').children;
  types.forEach((t, i) => {
    const count = state.pheromonesByType[t] || 0;
    const pct = Math.round((count / max) * 100);
    rows[i].querySelector('.ph-fill').style.width = pct + '%';
    rows[i].querySelector('.ph-count').textContent = count;
  });
}

// ============================================================================
// Footer Log
// ============================================================================
function addLogEntry(topic, data, type, ts) {
  const entry = { topic, data, type, ts: ts || Date.now() };
  state.logEntries.push(entry);
  if (state.logEntries.length > LOG_MAX) state.logEntries.shift();

  // Color for topic
  const topicColors = {
    task: 'var(--blue)',
    agent: 'var(--emerald)',
    pheromone: 'var(--amber)',
    quality: 'var(--purple)',
    memory: '#14B8A6',
    error: 'var(--red)',
  };
  const isFail = topic.includes('fail') || topic.includes('error');
  const cls = isFail ? 'le-error' : ('le-' + type);
  const topicColor = isFail ? 'var(--red)' : (topicColors[type] || 'var(--text-dim)');

  const brief = typeof data === 'string' ? data : summarizeEventData(topic, data);

  const div = document.createElement('div');
  div.className = 'log-entry ' + cls;
  div.innerHTML = `<span class="le-ts">${fmtTime(ts)}</span><span class="le-topic" style="color:${topicColor}">[${topic}]</span> ${brief}`;
  logEntriesEl.appendChild(div);

  // Trim
  while (logEntriesEl.children.length > LOG_MAX) {
    logEntriesEl.removeChild(logEntriesEl.firstChild);
  }

  // Auto-scroll
  logEntriesEl.scrollTop = logEntriesEl.scrollHeight;

  // Update count
  $('#logCount').textContent = state.logEntries.length;
}

function summarizeEventData(topic, data) {
  if (!data) return '';
  if (topic === 'agent.registered') return `${shortId(data.agentId)} as ${data.persona || '?'}${data.tier ? ' (' + data.tier + ')' : ''}`;
  if (topic === 'agent.end') return `${shortId(data.agentId)} departed`;
  if (topic === 'task.completed') return `${shortId(data.agentId)} finished ${data.description || shortId(data.taskId)}${data.duration ? ' (' + fmtDuration(data.duration) + ')' : ''}`;
  if (topic === 'task.failed') return `${shortId(data.agentId)} failed ${data.description || shortId(data.taskId)}`;
  if (topic === 'task.started') return `${shortId(data.agentId)} started ${data.description || shortId(data.taskId)}`;
  if (topic === 'pheromone.emitted') return `${data.type || 'trail'} pheromone`;
  if (topic === 'quality.evaluated') return `${shortId(data.agentId)} scored ${((data.score || 0) * 100).toFixed(0)}% - ${data.passed ? 'PASS' : 'FAIL'}`;
  if (topic.startsWith('memory.')) return `${data.action || topic.split('.')[1]} on ${data.layer || '?'}`;
  if (topic.startsWith('species.')) return `${data.speciesName || '?'}`;
  // Generic
  const s = JSON.stringify(data);
  return s.length > 80 ? s.slice(0, 77) + '\u2026' : s;
}

// ============================================================================
// Metrics Polling
// ============================================================================
async function pollMetrics() {
  try {
    const r = await fetch('/api/metrics');
    if (!r.ok) return;
    const m = await r.json();

    if (m.red) {
      state.red = m.red;
    }
    if (m.swarm) {
      state.swarm.tasksCompleted = m.swarm.tasksCompleted || 0;
      state.swarm.tasksFailed = m.swarm.tasksFailed || 0;
      state.swarm.pheromoneEvents = m.swarm.pheromoneEvents || 0;
      state.swarm.memoryEvents = m.swarm.memoryEvents || 0;
    }
    // Sync agents
    if (m.agents && m.agents.length) {
      for (const a of m.agents) {
        const id = a.id || a.agentId;
        if (!id) continue;
        if (!state.agents.has(id)) {
          onAgentRegistered({ agentId: id, persona: a.persona, tier: a.tier, status: a.status || 'active' });
        } else {
          const existing = state.agents.get(id);
          if (a.status) existing.status = a.status;
        }
      }
    }
    if (m.qualityEvals && m.qualityEvals.length && state.qualityEvals.length === 0) {
      state.qualityEvals = m.qualityEvals.map(q => ({ ...q, ts: q.timestamp || Date.now() }));
    }
    if (m.pheromonesByType) {
      Object.assign(state.pheromonesByType, m.pheromonesByType);
      updatePheromoneUI();
    }
    if (m.recentTasks && m.recentTasks.length) state.recentTasks = m.recentTasks;
    if (m.recentMemoryOps && m.recentMemoryOps.length) state.recentMemoryOps = m.recentMemoryOps;

    refreshLeftPanel();
    if (!state.selectedAgentId && !state.selectedTaskId) refreshRightPanel();
  } catch (_) {}
}

// ============================================================================
// Canvas Click Handler
// ============================================================================
function onCanvasClick(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  if (state.activeView === 'hive') {
    // Check hex hits
    let hit = null;
    for (const pos of state.hexPositions) {
      const d = Math.hypot(mx - pos.currentX, my - pos.currentY);
      if (d < pos.size) { hit = pos; break; }
    }
    if (hit) {
      state.selectedAgentId = state.selectedAgentId === hit.agentId ? null : hit.agentId;
      state.selectedTaskId = null;
    } else {
      state.selectedAgentId = null;
      state.selectedTaskId = null;
    }
  } else {
    // Check DAG node hits
    let hit = null;
    for (const node of state.dagNodes) {
      if (mx >= node.x && mx <= node.x + node.w && my >= node.y && my <= node.y + node.h) {
        hit = node; break;
      }
    }
    if (hit) {
      state.selectedTaskId = state.selectedTaskId === hit.taskId ? null : hit.taskId;
      state.selectedAgentId = null;
    } else {
      state.selectedAgentId = null;
      state.selectedTaskId = null;
    }
  }

  refreshLeftPanel();
  refreshRightPanel();
}

canvas.addEventListener('click', onCanvasClick);

// ============================================================================
// View Tab Switching
// ============================================================================
function setActiveView(view) {
  state.activeView = view;
  state.selectedAgentId = null;
  state.selectedTaskId = null;

  $$('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
  refreshRightPanel();
}

$$('.view-tab').forEach(tab => {
  tab.addEventListener('click', function() {
    setActiveView(this.dataset.view);
  });
});

// ============================================================================
// Footer Log Toggle
// ============================================================================
$('#logToggle').addEventListener('click', function() {
  const log = $('#footerLog');
  log.classList.toggle('collapsed');
  state.logCollapsed = log.classList.contains('collapsed');
});

// ============================================================================
// Keyboard Shortcuts
// ============================================================================
document.addEventListener('keydown', function(e) {
  // Don't capture if typing in an input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  if (e.key === '1') { setActiveView('hive'); }
  else if (e.key === '2') { setActiveView('dag'); }
  else if (e.key === 'Escape') {
    state.selectedAgentId = null;
    state.selectedTaskId = null;
    refreshLeftPanel();
    refreshRightPanel();
  }
});

// ============================================================================
// Demo Mode — ?demo in URL
// ============================================================================
function initDemo() {
  setConnectionState('live');

    { id: 'scout-beta', persona: 'scout-bee', tier: 'mid' },
    { id: 'worker-gamma', persona: 'worker-bee', tier: 'senior' },
    { id: 'worker-delta', persona: 'worker-bee', tier: 'mid' },
    { id: 'worker-epsilon', persona: 'worker-bee', tier: 'junior' },
    { id: 'guard-zeta', persona: 'guard-bee', tier: 'senior' },
    { id: 'guard-eta', persona: 'guard-bee', tier: 'mid' },
    { id: 'queen-omega', persona: 'queen-messenger', tier: 'senior' },
    { id: 'nurse-theta', persona: 'default', tier: 'mid' },
    { id: 'nurse-iota', persona: 'default', tier: 'junior' },

  personas.forEach(p => {
    onAgentRegistered({ agentId: p.id, persona: p.persona, tier: p.tier, status: 'active' });

  // Set one busy
  const busy = state.agents.get('worker-gamma');

  // Seed tasks
  const tasks = [
    { taskId: 't-001', agentId: 'scout-alpha', description: 'api-reconnaissance', status: 'completed', duration: 2340 },
    { taskId: 't-002', agentId: 'worker-gamma', description: 'schema-migration', status: 'executing', duration: null },
    { taskId: 't-003', agentId: 'worker-delta', description: 'endpoint-impl', status: 'completed', duration: 4120 },
    { taskId: 't-004', agentId: 'guard-zeta', description: 'auth-audit', status: 'completed', duration: 1800 },
    { taskId: 't-005', agentId: 'worker-epsilon', description: 'style-refactor', status: 'failed', duration: null },
    { taskId: 't-006', agentId: 'scout-beta', description: 'dep-analysis', status: 'completed', duration: 890 },
    { taskId: 't-007', agentId: 'queen-omega', description: 'orchestrate-v2', status: 'pending', duration: null },
    { taskId: 't-008', agentId: 'nurse-theta', description: 'test-coverage', status: 'completed', duration: 3200 },
  ];

  tasks.forEach(t => {
    state.tasks.set(t.taskId, t);
    if (t.agentId && state.agents.has(t.agentId)) {
      const a = state.agents.get(t.agentId);
      a.tasks.push(t);
      if (t.status === 'completed') a.successCount++;
      if (t.status === 'failed') a.failCount++;
    }
    state.recentTasks.push({ ...t, ts: Date.now() - Math.random() * 60000 });
  });

  // Swarm counters
  state.swarm = { tasksCompleted: 42, tasksFailed: 3, pheromoneEvents: 127, memoryEvents: 68 };
  state.red = { rate: 147, errorRate: 0.032, avgDuration: 285 };

  // Pheromones
  Object.assign(state.pheromonesByType, { trail: 52, alarm: 11, recruit: 28, territory: 7, dance: 29 });
  updatePheromoneUI();

  // Quality evals
  [
    { agentId: 'scout-alpha', score: 0.94, passed: true },
    { agentId: 'worker-gamma', score: 0.87, passed: true },
    { agentId: 'worker-delta', score: 0.72, passed: true },
    { agentId: 'guard-zeta', score: 0.91, passed: true },
    { agentId: 'worker-epsilon', score: 0.38, passed: false },
    { agentId: 'queen-omega', score: 0.96, passed: true },
    { agentId: 'nurse-theta', score: 0.83, passed: true },
  ].forEach(q => {
    state.qualityEvals.push({ ...q, ts: Date.now() - Math.random() * 120000 });
    const a = state.agents.get(q.agentId);
    if (a) a.qualityScores.push(q.score);
  });

  // Agent capabilities (random-ish for demo)
  state.agents.forEach(a => {
    a.capabilities = CAPABILITY_AXES.map(() => 0.2 + Math.random() * 0.7);
  });

  // Memory ops
  state.recentMemoryOps = [
    { action: 'record', layer: 'episodic', agentId: 'scout-alpha', ts: Date.now() },
    { action: 'query', layer: 'semantic', agentId: 'worker-gamma', ts: Date.now() },
    { action: 'snapshot', layer: 'working', agentId: 'queen-omega', ts: Date.now() },
    { action: 'consolidate', layer: 'episodic', agentId: 'nurse-theta', ts: Date.now() },
    { action: 'query', layer: 'working', agentId: 'guard-zeta', ts: Date.now() },
  ];

  // Log entries
  const demoLogs = [
    { topic: 'agent.registered', data: { agentId: 'queen-omega', persona: 'queen-messenger', tier: 'senior' }, type: 'agent' },
    { topic: 'task.completed', data: { agentId: 'scout-alpha', taskId: 't-001', description: 'api-reconnaissance', duration: 2340 }, type: 'task' },
    { topic: 'pheromone.emitted', data: { type: 'trail' }, type: 'pheromone' },
    { topic: 'quality.evaluated', data: { agentId: 'worker-gamma', score: 0.87, passed: true }, type: 'quality' },
    { topic: 'task.failed', data: { agentId: 'worker-epsilon', taskId: 't-005', description: 'style-refactor' }, type: 'task' },
    { topic: 'memory.consolidated', data: { action: 'consolidate', layer: 'episodic', agentId: 'scout-alpha' }, type: 'memory' },
    { topic: 'pheromone.emitted', data: { type: 'recruit' }, type: 'pheromone' },
    { topic: 'task.completed', data: { agentId: 'guard-zeta', taskId: 't-004', description: 'auth-audit', duration: 1800 }, type: 'task' },
    { topic: 'agent.registered', data: { agentId: 'nurse-iota', persona: 'default', tier: 'junior' }, type: 'agent' },
    { topic: 'pheromone.emitted', data: { type: 'alarm' }, type: 'pheromone' },
  ];

  demoLogs.forEach((log, i) => {
    addLogEntry(log.topic, log.data, log.type, Date.now() - (demoLogs.length - i) * 8000);
  });

  refreshLeftPanel();
  computeHexLayout();
  computeDAGLayout();
  refreshRightPanel();

  // Spawn initial particles
  setTimeout(function() {
    const positions = state.hexPositions;
    if (positions.length >= 2) {
      for (let i = 0; i < 12; i++) {
        const a = positions[Math.floor(Math.random() * positions.length)];
        const b = positions[Math.floor(Math.random() * positions.length)];
        if (a !== b) {
          const types = ['trail', 'recruit', 'alarm', 'dance'];
          const t = types[Math.floor(Math.random() * types.length)];
          spawnParticle(a.x, a.y, b.x, b.y, PHEROMONE_COLORS[t], t);
        }
      }
    }
  }, 200);

  // Continuous demo events
  let demoInterval = setInterval(function() {
    const positions = state.hexPositions;
    if (positions.length < 2) return;

    // Random pheromone particles
    const a = positions[Math.floor(Math.random() * positions.length)];
    const b = positions[Math.floor(Math.random() * positions.length)];
    if (a !== b) {
      const types = ['trail', 'recruit', 'alarm', 'dance', 'territory'];
      const t = types[Math.floor(Math.random() * types.length)];
      spawnParticle(a.x, a.y, b.x, b.y, PHEROMONE_COLORS[t] || '#F5A623', t);
    }

    // Occasional task completion
    if (Math.random() < 0.3) {
      const agents = [...state.agents.values()].filter(a => a.status !== 'offline');
      if (agents.length > 0) {
        const agent = agents[Math.floor(Math.random() * agents.length)];
        const descs = ['code-review', 'test-gen', 'lint-fix', 'doc-update', 'perf-audit', 'api-test', 'refactor', 'deploy-prep'];
        const desc = descs[Math.floor(Math.random() * descs.length)];
        const isFail = Math.random() < 0.1;

        if (isFail) {
          addLogEntry('task.failed', { agentId: agent.id, taskId: 't-' + Date.now(), description: desc }, 'task', Date.now());
        } else {
          const dur = 500 + Math.floor(Math.random() * 5000);
          addLogEntry('task.completed', { agentId: agent.id, taskId: 't-' + Date.now(), description: desc, duration: dur }, 'task', Date.now());
        }
      }
    }

    // Occasional quality eval
    if (Math.random() < 0.15) {
      const agents = [...state.agents.values()].filter(a => a.status !== 'offline');
      if (agents.length > 0) {
        const agent = agents[Math.floor(Math.random() * agents.length)];
        const score = 0.3 + Math.random() * 0.65;
        addLogEntry('quality.evaluated', { agentId: agent.id, score, passed: score >= 0.6 }, 'quality', Date.now());
      }
    }
  }, 2500);
}

// ============================================================================
// Initialization
// ============================================================================
const isDemo = location.search.includes('demo');

resizeCanvas();
refreshLeftPanel();
refreshRightPanel();

if (isDemo) {
  setTimeout(initDemo, 150);
} else {
  connectSSE();
  setInterval(pollMetrics, METRICS_POLL_MS);
  pollMetrics();
}

// Start animation loop
requestAnimationFrame(animate);

})();
