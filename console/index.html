<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claw-Swarm Console</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐝</text></svg>">
  <style>
    body { margin: 0; background: #0A0A1A; overflow: hidden; }
    #root { width: 100vw; height: 100vh; }
    .loading-splash {
      display: flex; align-items: center; justify-content: center;
      width: 100vw; height: 100vh; background: #0A0A1A;
      color: #00FFAA; font-family: 'Segoe UI', sans-serif; font-size: 16px;
    }
    .loading-splash .bee { font-size: 48px; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-splash">
      <div><span class="bee">🐝</span><br/>Loading Swarm Console...</div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
